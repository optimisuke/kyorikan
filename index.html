<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>キョリカン - 2画面 地図距離比較</title>
  <meta name="description" content="2つの地図を同じ縮尺で並べて表示し、別の場所の距離感を直感的に比較できるサイト。緯度によるメルカトル図法の歪みを自動補正します。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>キョリカン</h1>
    <p class="tagline">2つの地図を同じ縮尺で並べて、距離感をくらべる</p>
    <div class="header-actions">
      <button type="button" class="ghost-btn" id="save-default" title="現在の両地図の位置とズームを、次回開いたときの初期表示にします">初期位置として保存</button>
      <button type="button" class="ghost-btn" id="reset-default" title="初期位置をデフォルト（東京・那覇）に戻します">リセット</button>
    </div>
    <div class="primary-indicator">基準: <span id="primary-label">地図A</span></div>
  </header>

  <main class="panels">
    <section class="panel is-primary" id="panel-A">
      <div class="panel-header">
        <span class="panel-name">地図A</span>
        <form class="search-form" id="search-form-A">
          <input
            type="search"
            id="search-input-A"
            placeholder="地名・住所 または 緯度,経度"
            aria-label="地図Aの場所検索"
            autocomplete="off"
          >
          <button type="submit">検索</button>
        </form>
      </div>
      <p class="search-status" id="search-status-A"></p>
      <div class="map" id="map-A"></div>
      <div class="panel-footer">
        <span>計測距離:</span>
        <span class="distance-value" id="distance-A">—</span>
        <button type="button" class="clear-btn" id="clear-A">クリア</button>
      </div>
    </section>

    <section class="panel" id="panel-B">
      <div class="panel-header">
        <span class="panel-name">地図B</span>
        <form class="search-form" id="search-form-B">
          <input
            type="search"
            id="search-input-B"
            placeholder="地名・住所 または 緯度,経度"
            aria-label="地図Bの場所検索"
            autocomplete="off"
          >
          <button type="submit">検索</button>
        </form>
      </div>
      <p class="search-status" id="search-status-B"></p>
      <div class="map" id="map-B"></div>
      <div class="panel-footer">
        <span>計測距離:</span>
        <span class="distance-value" id="distance-B">—</span>
        <button type="button" class="clear-btn" id="clear-B">クリア</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>どちらかの地図を動かすと、もう片方が同じ実距離スケールに追従します。地図上を2点クリックすると距離を計測できます。</p>
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="main.js"></script>
</body>
</html>
